<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь дел</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <base href="/">
</head>
<body>
    <div class="app">
        <header>
            <div style="flex: 1;">
                <select id="calendarSelect" class="calendar-select"></select>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button id="leaveCalendarBtn" class="icon-btn" title="Выйти из календаря" style="display: none;">🚪</button>
                <button id="manageCalendarBtn" class="icon-btn" title="Управление календарем">⚙️</button>
                <button id="viewToggleBtn" class="view-toggle-btn" title="Переключить вид">
                    📅
                </button>
            </div>
        </header>
        
        <!-- Вид календаря (сетка) -->
        <div class="calendar-container view-calendar" id="calendarView">
            <div class="calendar-header">
                <button id="prevMonth">&lt;</button>
                <h2 id="currentMonthYear"></h2>
                <button id="nextMonth">&gt;</button>
            </div>
            
            <div class="weekdays">
                <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div>
                <div>Пт</div><div>Сб</div><div>Вс</div>
            </div>
            
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <!-- Вид дневника (дни недели вертикально) -->
        <div class="diary-container view-diary" id="diaryView" style="display: none;">
            <div class="diary-header">
                <button id="prevWeek">&lt;</button>
                <h2 id="currentWeek"></h2>
                <button id="nextWeek">&gt;</button>
            </div>
            <div class="diary-days" id="diaryDays"></div>
        </div>
        
        <div class="tasks-container">
            <div class="tasks-header">
                <h3>Задачи на <span id="selectedDate"></span></h3>
                <button id="addTaskBtn" class="add-btn">+ Добавить</button>
            </div>
            
            <div class="tasks-list" id="tasksList">
                <p class="no-tasks">Выберите дату</p>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно для добавления задачи -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3>✨ Новая задача</h3>
            <input type="text" id="taskInput" placeholder="Что нужно сделать?" maxlength="255">
            <div class="form-group">
                <input type="checkbox" id="taskHasTime" name="taskHasTime">
                <label for="taskHasTime">📅 Указать время выполнения</label>
            </div>
            <div id="taskTimeGroup" class="form-group" style="display: none;">
                <label>⏰ Время выполнения</label>
                <div class="time-inputs">
                    <div class="time-field">
                        <label for="taskTimeStart">Начало</label>
                        <input type="time" id="taskTimeStart" name="taskTimeStart">
                    </div>
                    <div class="time-period-toggle">
                        <input type="checkbox" id="taskIsPeriod" name="taskIsPeriod">
                        <label for="taskIsPeriod" title="Задать период времени">📍</label>
                    </div>
                    <div class="time-field" id="taskTimeEndGroup" style="display: none;">
                        <label for="taskTimeEnd">Конец</label>
                        <input type="time" id="taskTimeEnd" name="taskTimeEnd">
                    </div>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="closeModalBtn">❌ Отмена</button>
                <button id="saveTaskBtn">✅ Создать</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно управления календарем -->
    <div id="manageCalendarModal" class="modal">
        <div class="modal-content large">
            <h3 id="manageCalendarTitle">Управление календарем</h3>
            <div id="manageCalendarTabs" class="tabs">
                <button class="tab-btn active" data-tab="settings">Настройки</button>
                <button class="tab-btn" data-tab="members">Участники</button>
                <button class="tab-btn" data-tab="invites">Приглашения</button>
            </div>
            
            <!-- Вкладка настроек -->
            <div id="tab-settings" class="tab-content active">
                <div class="form-group2">
                    <label>Название календаря:</label>
                    <input type="text" id="calendarNameInput" placeholder="Название календаря">
                    <button id="updateCalendarNameBtn" class="btn-primary">Сохранить</button>
                </div>
                <div class="form-group2">
                    <button id="createCalendarBtn" class="btn-primary">+ Создать новый календарь</button>
                </div>
                <div class="form-group2" id="deleteCalendarGroup" style="display: none;">
                    <button id="deleteCalendarBtn" class="btn-danger-outline">🗑️ Удалить календарь</button>
                </div>
                <div class="form-group2 notification-settings-group">
                    <label>Типы уведомлений:</label>
                    <div class="notification-checkboxes">
                        <input type="checkbox" id="notifyDayBefore" name="notifyDayBefore">
                        <label for="notifyDayBefore">За день до задачи</label><br>
                        <input type="checkbox" id="notifyHourBefore" name="notifyHourBefore">
                        <label for="notifyHourBefore">За час до задачи</label><br>
                        <input type="checkbox" id="notify10MinBefore" name="notify10MinBefore">
                        <label for="notify10MinBefore">За 10 минут до задачи</label>
                    </div>
                    <button id="saveNotificationSettingsBtn" class="btn-primary">Сохранить уведомления</button>
                </div>
            </div>

            <!-- Вкладка участников -->
            <div id="tab-members" class="tab-content">
                <div id="membersList"></div>
            </div>

            <!-- Вкладка приглашений -->
            <div id="tab-invites" class="tab-content">
                <button id="createInviteBtn" class="btn-primary">+ Создать приглашение</button>
                <div id="invitesList"></div>
            </div>

            <div class="modal-buttons">
                <button id="closeManageModalBtn">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания календаря -->
    <div id="createCalendarModal" class="modal">
        <div class="modal-content">
            <h3>Создать календарь</h3>
            <input type="text" id="newCalendarNameInput" placeholder="Название календаря">
            <div class="modal-buttons">
                <button id="saveNewCalendarBtn">Создать</button>
                <button id="closeCreateCalendarBtn">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно приглашения -->
    <div id="inviteModal" class="modal">
        <div class="modal-content">
            <h3>Приглашение создано</h3>
            <div class="invite-info">
                <div class="invite-code">
                    <label>Код для присоединения:</label>
                    <div class="code-display">
                        <code id="inviteCodeDisplay"></code>
                        <button id="copyCodeBtn" class="copy-btn" onclick="copyToClipboard(document.getElementById('inviteCodeDisplay').textContent)">📋</button>
                    </div>
                    <small>Отправьте боту: <code>/join <span id="inviteCodeText"></span></code></small>
                    <p style="margin-top: 10px; color: var(--hint-color); font-size: 14px;">
                        Пользователь должен отправить боту команду <strong>/join</strong> и затем код приглашения
                    </p>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="closeInviteModalBtn">Закрыть</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
